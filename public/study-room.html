<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BlinkMeet — Study Session</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="stylesheet" href="/css/style.css"/>
<link rel="stylesheet" href="/css/study.css"/>
</head>
<body>
<div class="study-shell">
  <div class="study-topbar">
    <div class="study-topbar-left">
      <span class="tally live" style="width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px rgba(239,68,68,.7);animation:pulse 1.5s infinite;flex-shrink:0"></span>
      <span class="room-name-display" id="topbarRoomName">Study Room</span>
      <span class="cat-chip" id="topbarCatChip">DSA</span>
    </div>
    <div class="study-topbar-center">
      <div class="pomodoro-widget" id="pomodoroBox">
        <span class="pomo-phase" id="pomoPhase">STUDY</span>
        <span class="pomo-time" id="pomoTime">25:00</span>
        <button class="pomo-btn" id="pomoToggleBtn" title="Start/Pause">▶</button>
      </div>
    </div>
    <div class="study-topbar-right">
      <span class="activity-badge waiting" id="activityBadge">Waiting</span>
      <div class="host-code-widget" id="hostCodeWidget" style="display:none">
        CODE: <span class="host-code-val" id="hostCodeDisplay">—</span>
        <span class="host-code-countdown" id="codeCountdown">15s</span>
        <button style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px" id="copyCodeBtn" title="Copy code">📋</button>
      </div>
      <button class="btn btn-danger btn-sm" id="leaveBtn">Leave</button>
    </div>
  </div>

  <div class="study-main-layout">
    <div class="study-left-col">
      <!-- Video tiles -->
      <div class="study-video-row" id="videoRow"></div>

      <!-- Question panel -->
      <div class="question-panel" id="questionPanel">
        <div class="qp-header">
          <div class="qp-round-info">
            <span class="round-chip" id="roundBadge">Round 1</span>
            <span class="round-label" id="roundLabel">Arrays</span>
          </div>
          <div class="qp-meta">
            <span class="progress-text" id="progressText">Question 1/50</span>
            <span class="diff-badge Easy" id="diffBadge">Easy</span>
          </div>
        </div>

        <!-- DSA full problem area -->
        <div class="qp-body" id="dsaArea">
          <div class="q-id" id="qId">Problem #1</div>
          <div class="q-title" id="qTitle">Two Sum</div>
          <div class="q-tags" id="qTags"></div>
          <div class="q-section-label">Problem Statement</div>
          <div class="q-statement" id="qStatement">—</div>
          <div id="qExamplesWrap"></div>
          <div class="q-section-label" id="qConstraintsLabel" style="display:none">Constraints</div>
          <div class="q-constraints" id="qConstraints" style="display:none"></div>
        </div>

        <!-- Java / C question area -->
        <div class="qp-body" id="jcArea" style="display:none">
          <div class="q-id" id="jcQNum">Q1 / 100</div>
          <div class="q-title" id="jcQTitle">Question</div>
          <div class="q-tags"><span class="q-tag" id="jcTopic">Topic</span></div>
          <div class="q-hint-box" id="hintBox" style="display:none">
            <div class="hint-label">💡 HINT</div>
            <p id="hintText"></p>
          </div>
          <button class="btn btn-ghost btn-sm" id="hintToggleBtn" style="margin-top:14px">Show Hint</button>
        </div>

        <div class="qp-footer">
          <div class="nav-btns" id="navBtns">
            <button class="btn btn-ghost btn-sm" id="prevBtn">← Previous</button>
            <button class="btn btn-primary btn-sm" id="nextBtn">Next →</button>
          </div>
          <button class="mark-done-btn" id="markDoneBtn">☐ Mark Done</button>
        </div>
      </div>

      <!-- Round selector (DSA, host only) -->
      <div class="round-selector" id="roundSelector" style="display:none">
        <span style="font-size:11px;color:var(--text2);font-family:var(--mono)">ROUND:</span>
        <button class="round-pill active" data-round="1">1 · Arrays</button>
        <button class="round-pill" data-round="2">2 · Strings</button>
        <button class="round-pill" data-round="3">3 · Recursion</button>
      </div>
    </div>

    <!-- Right panel: chat + notes -->
    <div class="study-right-col" id="rightPanel">
      <div class="study-panel-tabs">
        <button class="study-tab active" id="tabChat">Chat</button>
        <button class="study-tab" id="tabNotes">Notes</button>
      </div>
      <div class="study-tab-body">
        <div id="chatBody" class="chat-panel">
          <div class="chat-log" id="srChatLog"></div>
          <form class="chat-form" id="srChatForm">
            <input type="text" id="srChatInput" placeholder="Message…" autocomplete="off"/>
            <button type="submit">↵</button>
          </form>
        </div>
        <div id="notesBody" style="display:none;flex:1;display:none;flex-direction:column">
          <textarea id="notesTextarea" placeholder="Your personal notes for this session…"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="study-controls">
    <button class="ctrl-btn" id="micBtn" title="Mute/Unmute">🎙️</button>
    <button class="ctrl-btn" id="camBtn" title="Camera on/off">📷</button>
    <button class="ctrl-btn" id="raiseHandBtn" title="Raise hand">✋</button>
    <button class="ctrl-btn" id="panelToggleBtn" title="Toggle chat">💬</button>
  </div>

  <div class="hands-toast" id="handsToast" style="display:none"></div>

  <!-- Waiting overlay -->
  <div class="study-waiting-overlay" id="waitingOverlay" style="display:none">
    <div class="study-waiting-box">
      <span style="width:12px;height:12px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite"></span>
      <p class="waiting-title">Waiting for participants…</p>
      <p style="font-size:13px;color:var(--text2);margin:0">Share your room code to invite others.</p>
      <div class="waiting-code" id="waitingCodeDisplay">—</div>
      <p style="font-size:11px;color:var(--text2);margin:0">Code rotates every 15 seconds</p>
      <button class="btn btn-primary" id="waitingStartBtn" style="margin-top:16px">Start Session Anyway</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/data/questions.js"></script>
<script src="/js/study-room.js"></script>
</body>
</html>
