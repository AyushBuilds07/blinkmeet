<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BlinkMeet — History</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="stylesheet" href="/css/style.css"/>
<script src="/js/theme.js"></script>
</head>
<body>
<div class="app-shell">
  <button class="hamburger-btn" id="hamburgerBtn">☰</button>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar">
    <div class="brand"><div class="brand-logo">📹</div><span class="brand-name">BlinkMeet</span><button class="sidebar-close-btn" id="sidebarCloseBtn">✕</button></div>
    <p class="nav-section-label">Main</p>
    <div class="nav-item" id="homeNav"><span class="nav-icon">⌂</span> Home</div>
    <div class="nav-item" id="meetingsNav"><span class="nav-icon">📹</span> Meetings</div>
    <p class="nav-section-label">Rooms</p>
    <div class="nav-item" id="gameRoomsNav"><span class="nav-icon">🎮</span> Game Rooms</div>
    <div class="nav-item" id="studyRoomsNav"><span class="nav-icon">📚</span> Study Rooms</div>
    <p class="nav-section-label">History</p>
    <div class="nav-item active"><span class="nav-icon">↺</span> Recent Rooms</div>
    <div class="sidebar-bottom">
      <div class="nav-item" id="settingsNav"><span class="nav-icon">⚙</span> Settings</div>
      <div class="sidebar-user"><div class="sidebar-user-avatar" id="sidebarAvatar">—</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarName">—</div><div class="sidebar-user-status">● Online</div></div></div>
    </div>
  </div>
  <div class="main-content">
    <div class="topbar"><div><div class="topbar-title">Call History</div><div class="topbar-subtitle">Your recent meetings and sessions</div></div><button class="btn btn-ghost btn-sm" id="clearHistoryBtn">Clear All</button></div>
    <div class="page-content">
      <p class="section-title">All Calls</p>
      <div class="recent-list" id="historyList"><div style="text-align:center;padding:40px;color:var(--text2)">Loading…</div></div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="bottom-nav-item" onclick="location.href='/home.html'"><span class="bn-icon">⌂</span>Home</div>
    <div class="bottom-nav-item" onclick="location.href='/game-rooms.html'"><span class="bn-icon">🎮</span>Games</div>
    <div class="bottom-nav-item" onclick="location.href='/study-rooms.html'"><span class="bn-icon">📚</span>Study</div>
    <div class="bottom-nav-item active"><span class="bn-icon">↺</span>History</div>
    <div class="bottom-nav-item" onclick="location.href='/settings.html'"><span class="bn-icon">⚙</span>Settings</div>
  </div>
</div>
<script src="/js/nav.js"></script>
<script src="/js/history.js"></script>
</body>
</html>
